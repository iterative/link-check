name: Check new links against deployment
on:
  workflow_call:
    inputs:
      branch:
        type: "string"
        required: false
        description: "The branch to compare against when finding new links to check"
        default: "${{ github.event.repository.default_branch }}"
      failsOnly:
        type: "boolean"
        required: false
        description: "If true, only reports failed links"
        default: true
      outputFile:
        type: "string"
        required: false
        description: "The file the link check report will be written to before publishing"
        default: "link-check-report.md"
      config:
        type: 'string'
        description: 'The path to the link-check config file'
        default: 'config/link-check/config.yml'
jobs:
  run:
    name: Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: >-
      github.event.deployment.ref != inputs.branch &&
      github.event.deployment_status.state == 'success'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - run: echo "# Link Check Report" > ${{ inputs.outputFile }}
      - name: Run Link Check
        id: check
        continue-on-error: true
        run: |
          npx repo-link-check \
            ${{ inputs.failsOnly && '-f' || '' }} \
            -d ${{ inputs.branch }} \
            -c ${{ inputs.config }} \
            -r ${{ github.event.deployment.payload.web_url }} \
            >> ${{ inputs.outputFile }}
      - name: Create or update comment
        uses: actions/github-script@v7
        env:
          OUTPUT_FILE: ${{ inputs.outputFile }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- link-check-report -->';
            const body = marker + '\n' + fs.readFileSync(process.env.OUTPUT_FILE, 'utf8');
            const { owner, repo } = context.repo;
            const ref = context.payload.deployment.ref;

            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', head: `${owner}:${ref}`,
            });
            if (prs.length === 0) {
              core.info(`No open PR found for branch "${ref}"; skipping comment.`);
              return;
            }
            const issue_number = prs[0].number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
